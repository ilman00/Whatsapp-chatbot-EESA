name: Deploy WhatsApp Backend

on:
  push:
    branches:
      - main

concurrency:
  group: Whatsapp-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Build project
      - name: Build TypeScript
        run: npm run build

      # 5️⃣ Remove dev dependencies (production only)
      - name: Prepare production build
        run: |
          rm -rf node_modules
          npm ci --omit=dev

      # 6️⃣ Deploy files via rsync
      - name: Deploy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "dist,node_modules,package.json"
          target: ${{ secrets.APP_PATH }}

      # 7️⃣ Restart PM2
      - name: Restart Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ${{ secrets.APP_PATH }}
            pm2 restart chatbot || pm2 start dist/index.js --name chatbot
            pm2 save
